<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ATR Admin Dashboard</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<body>

<div class="admin-layout">

<!-- Sidebar -->

<div class="sidebar">

<h2>🎓 ATR Admin</h2>

<a href="#"><i class="fas fa-chart-line"></i> Dashboard</a>

<a href="#"><i class="fas fa-book"></i> Notes</a>

<a href="#"><i class="fas fa-file-pdf"></i> PDFs</a>

<a href="#"><i class="fas fa-users"></i> Users</a>

<a href="#"><i class="fas fa-crown"></i> Premium</a>

<a href="#"><i class="fas fa-money-bill-wave"></i> Payments</a>

<a href="#"><i class="fas fa-cog"></i> Settings</a>

<a href="../index.html"><i class="fas fa-home"></i> Website</a>

</div>

<!-- Main -->

<div class="main">

<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<h2>👥</h2>
<h3>Total Users</h3>
<p id="usersCount">0</p>
</div>

<div class="card">
<h2>⭐</h2>
<h3>Premium Users</h3>
<p id="premiumCount">0</p>
</div>

<div class="card">
<h2>📄</h2>
<h3>Notes</h3>
<p>0</p>
</div>

<div class="card">
<h2>💰</h2>
<h3>Revenue</h3>
<p>₹0</p>
</div>

</div>

</div>

</div>

<script type="module" src="dashboard.js"></script>
