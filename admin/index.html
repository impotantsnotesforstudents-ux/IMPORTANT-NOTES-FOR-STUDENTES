<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ATR Admin Login</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="login-box">

<h1>🔐 ATR Admin</h1>

<p>Administrator Login</p>

<form id="adminLogin">

<input
type="email"
id="email"
placeholder="Admin Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit">

Login

</button>

</form>

</div>

<script type="module" src="admin.js"></script>

</body>

</html>
