<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ATR Important Notes</title>

    <link rel="stylesheet" href="../style.css">

    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .auth-box{
            width:380px;
            background:#1e293b;
            padding:35px;
            border-radius:15px;
            text-align:center;
            color:#fff;
            box-shadow:0 10px 25px rgba(0,0,0,.35);
        }

        .auth-logo{
            width:90px;
            margin-bottom:15px;
        }

        .auth-box h2{
            margin:10px 0;
        }

        .auth-box p{
            color:#cbd5e1;
        }

        input{
            width:100%;
            padding:14px;
            margin:10px 0;
            border:none;
            border-radius:10px;
            font-size:16px;
            box-sizing:border-box;
        }

        .btn{
            width:100%;
            padding:14px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:10px;
            font-size:17px;
            cursor:pointer;
            margin-top:10px;
        }

        .btn:hover{
            background:#1d4ed8;
        }

        .divider{
            margin:20px 0;
            color:#94a3b8;
        }

        .google-btn{
            width:100%;
            padding:13px;
            background:#fff;
            color:#111;
            border:none;
            border-radius:10px;
            display:flex;
            align-items:center;
            justify-content:center;
            gap:10px;
            font-size:16px;
            cursor:pointer;
        }

        .google-btn img{
            width:22px;
        }

        a{
            color:#3b82f6;
            text-decoration:none;
        }

        a:hover{
            text-decoration:underline;
        }
    </style>
</head>

<body>

<div class="auth-box">

<img src="../images/LOGO.jpeg" class="auth-logo" alt="ATR Logo">

<h2>Welcome Back</h2>

<p>Login to your ATR Important Notes account</p>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Email Address"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit" class="btn">
Login
</button>

<div class="divider">
──────── OR ────────
</div>

<button type="button" id="googleLogin" class="google-btn">
<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
Continue with Google
</button>

</form>

<br>

<p>
Don't have an account?
<a href="signup.html">Create Account</a>
</p>

</div>

<script type="module" src="../firebase.js"></script>
<script type="module" src="../login.js"></script>

</body>
</html>
