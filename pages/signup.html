<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | ATR Important Notes</title>

<link rel="stylesheet" href="../style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="auth-container">

<div class="auth-box">

<img src="../images/LOGO.jpeg" class="auth-logo" alt="ATR Logo">

<h2>Create Account</h2>

<p>Join ATR Important Notes</p>

<form id="signupForm">

<div class="input-box">

<input type="text"
id="name"
placeholder="Full Name"
required>

</div>

<div class="input-box">

<input type="email"
id="email"
placeholder="Email Address"
required>

</div>

<div class="input-box">

<input type="password"
id="password"
placeholder="Password"
required>

</div>

<div class="input-box">

<input type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>

</div>

<button type="submit" class="btn">

Create Account

</button>

<p class="switch">

Already have an account?

<a href="login.html">

Login

</a>

</p>

</form>

</div>

</div>

<script type="module" src="../firebase.js"></script>
<script type="module" src="../firebase.js"></script>
<script type="module" src="../signup.js"></script>
</body>

</html>
